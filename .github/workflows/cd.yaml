name: CD - Deploy Docker

on:
    push:
        branches: ['main']

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout do código
              uses: actions/checkout@v4

            - name: Login no Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build da imagem
              run: |
                  docker build -t ${{ secrets.DOCKER_USERNAME }}/pucprojeto:latest .

            - name: Push da imagem
              run: |
                  docker push ${{ secrets.DOCKER_USERNAME }}/pucprojeto:latest

            - name: Notificação Discord (CD)
              uses: sarisia/actions-status-discord@v1
              if: always()
              with:
                  webhook: ${{ secrets.DISCORD_WEBHOOK }}
                  title: 'Deploy Docker - Projeto PUC'
                  description: 'Imagem enviada para o Docker Hub com status: ${{ job.status }}'
                  color: 0x00ff00
